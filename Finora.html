<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finora — All-in-One Finance Calculator Hub</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDKs (modular v9+) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",

            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background 0.25s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg-page: #f4f7fc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-light: #e2e8f0;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.08);
            --header-bg: #ffffffcc;
            --badge-bg: #eef2ff;
            --icon-bg: #f1f5f9;
        }

        body.dark {
            --bg-page: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.3);
            --header-bg: #0f172acc;
            --badge-bg: #2d3a5e;
            --icon-bg: #2d3748;
        }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            padding: 24px 20px 40px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 48px;
            border: 1px solid var(--border-light);
        }

        .logo h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 8px rgba(59,130,246,0.2);
        }

        .theme-toggle {
            background: var(--icon-bg);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 16px;
        }

        .calc-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .calc-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .card-icon {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .calc-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .calc-card p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 550px;
            width: 90%;
            border-radius: 36px;
            padding: 28px 24px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--border-light);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-page);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .calc-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin: 10px 0 16px;
            font-size: 1rem;
        }

        .result-area {
            background: var(--badge-bg);
            border-radius: 24px;
            padding: 16px;
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .history-list {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border-light);
        }

        .history-item {
            border-bottom: 1px solid var(--border-light);
            padding: 14px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .delete-history {
            background: #ef4444;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .settings-panel {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border-light);
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        button.secondary {
            background: var(--icon-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }

        .empty-msg {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }

        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        @media (max-width: 680px) {
            .top-bar { flex-direction: column; align-items: stretch; border-radius: 28px; }
            .nav-tabs { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo"><h1><i class="fas fa-calculator"></i> Finora</h1></div>
        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="calculators"><i class="fas fa-th-large"></i> Calculators</button>
            <button class="tab-btn" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button class="tab-btn" data-tab="history"><i class="fas fa-history"></i> History</button>
            <button class="tab-btn" data-tab="settings"><i class="fas fa-sliders-h"></i> Settings</button>
        </div>
        <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i></button>
    </div>

    <!-- calculators grid tab -->
    <div id="calculatorsTab" class="tab-content active">
        <div class="cards-grid" id="calculatorsGrid"></div>
    </div>

    <!-- dashboard tab -->
    <div id="dashboardTab" class="tab-content" style="display:none;">
        <div class="stats-dashboard" id="dashboardStats"></div>
        <div class="history-list">
            <h3><i class="fas fa-clock"></i> Recent Activity</h3>
            <div id="recentHistoryPreview"></div>
        </div>
    </div>

    <!-- history tab -->
    <div id="historyTab" class="tab-content" style="display:none;">
        <div class="history-list">
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:16px;">
                <h3>📜 Full Calculation History</h3>
                <button id="clearAllHistoryBtn" class="secondary" style="background:#dc2626; color:white;">Clear All History</button>
            </div>
            <div id="fullHistoryList"></div>
        </div>
    </div>

    <!-- settings tab -->
    <div id="settingsTab" class="tab-content" style="display:none;">
        <div class="settings-panel">
            <h3><i class="fas fa-cog"></i> Preferences</h3>
            <div class="settings-option">
                <span><i class="fas fa-palette"></i> Dark/Light Theme</span>
                <button id="settingsThemeBtn" class="secondary">Toggle Theme</button>
            </div>
            <div class="settings-option">
                <span><i class="fas fa-trash-alt"></i> Clear All History</span>
                <button id="settingsClearHistoryBtn" class="secondary">Clear History</button>
            </div>
            <div class="settings-option">
                <span><i class="fas fa-info-circle"></i> About: 30 Finance Calculators</span>
                <span style="font-size:0.8rem;">v1.0 • real-time</span>
            </div>
        </div>
    </div>
    <footer>⚡ 30+ finance tools | Real calculations | History saved locally</footer>
</div>

<!-- Modal for calculator -->
<div id="calcModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Calculator</h2>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div id="modalDynamicFields"></div>
        <button id="modalCalculateBtn" class="calc-btn"><i class="fas fa-equals"></i> Calculate</button>
        <div id="modalResult" class="result-area">—</div>
    </div>
</div>

<script type="module">
    // ==================== FIREBASE CONFIGURATION (EXACTLY AS PROVIDED) ====================
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyDcjc29tTVXZ4qz1twTimyBOL84Jp9N-4k",
      authDomain: "all-in-one-calculater-666b3.firebaseapp.com",
      projectId: "all-in-one-calculater-666b3",
      storageBucket: "all-in-one-calculater-666b3.firebasestorage.app",
      messagingSenderId: "172963257239",
      appId: "1:172963257239:web:2484a322db7461745102d2",
      measurementId: "G-F4LKE3ZVWT"
    };

    // Import Firebase modules
    import { initializeApp } from "firebase/app";
    import { getAnalytics } from "firebase/analytics";

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    console.log("Firebase analytics initialized", analytics.app.name);
    // =============================================================================

    // ------------------------- 30 Finance Calculators Definition -------------------------
    const calculators = [
        { id: "emi", name: "Loan EMI Calculator", desc: "Monthly installment for loans", fields: [{n:"principal",l:"Loan Amount (₹)",def:500000},{n:"rate",l:"Annual Rate (%)",def:9.5},{n:"tenure",l:"Tenure (months)",def:60}], compute:(vals)=> { let p=vals.principal,r=vals.rate/12/100,n=vals.tenure; let emi = p * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1); return `EMI: ₹${emi.toFixed(2)}`; } },
        { id: "fd", name: "Fixed Deposit", desc: "Maturity amount with compound interest", fields:[{n:"principal",l:"Deposit (₹)",def:100000},{n:"rate",l:"Rate (%)",def:7},{n:"years",l:"Years",def:5}], compute:(vals)=> { let a = vals.principal * Math.pow(1+vals.rate/100, vals.years); return `Maturity: ₹${a.toFixed(2)}`; } },
        { id: "rd", name: "Recurring Deposit", desc: "Monthly deposits + compound", fields:[{n:"monthly",l:"Monthly Deposit (₹)",def:5000},{n:"rate",l:"Rate (%)",def:6.5},{n:"months",l:"Months",def:24}], compute:(vals)=> { let r = vals.rate/12/100; let n = vals.months; let m = vals.monthly; let maturity = m * ((Math.pow(1+r,n)-1)/r) * (1+r); return `Maturity: ₹${maturity.toFixed(2)}`; } },
        { id: "compound", name: "Compound Interest", desc: "Lumpsum growth", fields:[{n:"p",l:"Principal (₹)",def:50000},{n:"r",l:"Rate (%)",def:12},{n:"t",l:"Years",def:5}], compute:(vals)=> { let amt = vals.p * Math.pow(1+vals.r/100, vals.t); return `Amount: ₹${amt.toFixed(2)}`; } },
        { id: "simple", name: "Simple Interest", desc: "Simple interest on principal", fields:[{n:"p",l:"Principal",def:50000},{n:"r",l:"Rate (%)",def:8},{n:"t",l:"Years",def:3}], compute:(vals)=> { let si = vals.p * vals.r * vals.t /100; return `Interest: ₹${si.toFixed(2)} | Total: ₹${(vals.p+si).toFixed(2)}`; } },
        { id: "sip", name: "SIP Calculator", desc: "Systematic investment plan", fields:[{n:"monthly",l:"Monthly (₹)",def:5000},{n:"return",l:"Annual Return (%)",def:12},{n:"years",l:"Years",def:10}], compute:(vals)=> { let r = vals.return/12/100; let n = vals.years*12; let future = vals.monthly * ((Math.pow(1+r,n)-1)/r) * (1+r); return `Wealth: ₹${future.toFixed(2)}`; } },
        { id: "lumpsum", name: "Lumpsum Investment", desc: "Future value of lump sum", fields:[{n:"amount",l:"Investment (₹)",def:100000},{n:"rate",l:"Return (%)",def:11},{n:"years",l:"Years",def:7}], compute:(vals)=> { let val = vals.amount * Math.pow(1+vals.rate/100, vals.years); return `Future Value: ₹${val.toFixed(2)}`; } },
        { id: "retirement", name: "Retirement Corpus", desc: "Monthly withdrawal corpus", fields:[{n:"monthlyExp",l:"Monthly Require (₹)",def:50000},{n:"years",l:"Retirement years",def:25},{n:"return",l:"Post-ret ROI (%)",def:7}], compute:(vals)=> { let r = vals.return/12/100; let n = vals.years*12; let corpus = vals.monthlyExp * ((1 - Math.pow(1+r, -n))/r); return `Required Corpus: ₹${corpus.toFixed(0)}`; } },
        { id: "prepayment", name: "Loan Prepayment", desc: "Savings on early payment", fields:[{n:"principal",l:"Loan Amt (₹)",def:25e5},{n:"rate",l:"Rate (%)",def:9},{n:"monthsLeft",l:"Months left",def:120},{n:"prepay",l:"Prepay Amount (₹)",def:100000}], compute:(vals)=> { let r = vals.rate/12/100; let emiOrig = vals.principal * r * Math.pow(1+r,vals.monthsLeft) / (Math.pow(1+r,vals.monthsLeft)-1); let totalOrig = emiOrig * vals.monthsLeft; let newPrinc = vals.principal - vals.prepay; let newEmi = newPrinc * r * Math.pow(1+r,vals.monthsLeft) / (Math.pow(1+r,vals.monthsLeft)-1); let totalNew = newEmi * vals.monthsLeft; let saved = totalOrig - totalNew; return `Savings: ₹${saved.toFixed(2)}`; } },
        { id: "restructure", name: "EMI Restructuring", desc: "New EMI after rate change", fields:[{n:"principal",l:"Remaining (₹)",def:15e5},{n:"oldRate",l:"Old Rate (%)",def:10},{n:"newRate",l:"New Rate (%)",def:8},{n:"months",l:"Months left",def:48}], compute:(vals)=> { let rOld = vals.oldRate/12/100; let rNew = vals.newRate/12/100; let emiOld = vals.principal * rOld * Math.pow(1+rOld,vals.months) / (Math.pow(1+rOld,vals.months)-1); let emiNew = vals.principal * rNew * Math.pow(1+rNew,vals.months) / (Math.pow(1+rNew,vals.months)-1); return `Old EMI: ₹${emiOld.toFixed(2)} | New EMI: ₹${emiNew.toFixed(2)}`; } },
        { id: "balanceTransfer", name: "Home Loan Balance Transfer", desc: "Savings", fields:[{n:"balance",l:"Balance (₹)",def:30e5},{n:"oldRate",l:"Old Rate (%)",def:9},{n:"newRate",l:"New Rate (%)",def:7.5},{n:"months",l:"Months left",def:180}], compute:(vals)=> { let rOld = vals.oldRate/12/100; let rNew = vals.newRate/12/100; let emiOld = vals.balance * rOld * Math.pow(1+rOld,vals.months) / (Math.pow(1+rOld,vals.months)-1); let emiNew = vals.balance * rNew * Math.pow(1+rNew,vals.months) / (Math.pow(1+rNew,vals.months)-1); let saving = (emiOld-emiNew)*vals.months; return `Monthly save ₹${(emiOld-emiNew).toFixed(2)} | Total save ₹${saving.toFixed(2)}`; } },
        { id: "carLoan", name: "Car Loan EMI", desc: "Auto loan monthly", fields:[{n:"principal",l:"Car Loan (₹)",def:800000},{n:"rate",l:"Rate (%)",def:9},{n:"tenure",l:"Months",def:60}], compute:(vals)=> { let r=vals.rate/12/100; let emi = vals.principal * r * Math.pow(1+r,vals.tenure) / (Math.pow(1+r,vals.tenure)-1); return `EMI: ₹${emi.toFixed(2)}`; } },
        { id: "personalLoan", name: "Personal Loan EMI", desc: "Unsecured loan", fields:[{n:"principal",l:"Amount (₹)",def:500000},{n:"rate",l:"Rate (%)",def:12},{n:"months",l:"Months",def:36}], compute:(vals)=> { let r=vals.rate/12/100; let emi = vals.principal * r * Math.pow(1+r,vals.months) / (Math.pow(1+r,vals.months)-1); return `EMI: ₹${emi.toFixed(2)}`; } },
        { id: "creditCard", name: "Credit Card Interest", desc: "Outstanding interest", fields:[{n:"balance",l:"Outstanding (₹)",def:25000},{n:"rate",l:"Monthly Rate (%)",def:3.5},{n:"months",l:"Months to pay",def:6}], compute:(vals)=> { let total = vals.balance * Math.pow(1+vals.rate/100, vals.months); return `Payable: ₹${total.toFixed(2)}`; } },
        { id: "loanEligibility", name: "Loan Eligibility", desc: "Max loan amount", fields:[{n:"income",l:"Monthly Income (₹)",def:60000},{n:"existing",l:"Existing EMI (₹)",def:5000},{n:"tenure",l:"Months",def:60},{n:"rate",l:"Rate (%)",def:10}], compute:(vals)=> { let maxEmi = vals.income*0.5 - vals.existing; let r = vals.rate/12/100; let eligible = maxEmi * (Math.pow(1+r,vals.tenure)-1)/(r*Math.pow(1+r,vals.tenure)); return `Eligible up to: ₹${eligible.toFixed(0)}`; } },
        { id: "ltv", name: "LTV Calculator", desc: "Loan to Value ratio", fields:[{n:"property",l:"Property Value (₹)",def:50e5},{n:"loan",l:"Loan Amount (₹)",def:35e5}], compute:(vals)=> { let ltv = (vals.loan/vals.property)*100; return `LTV: ${ltv.toFixed(2)}%`; } },
        { id: "gratuity", name: "Gratuity", desc: "Employee benefit", fields:[{n:"basic",l:"Last drawn basic (₹)",def:50000},{n:"years",l:"Years of service",def:12}], compute:(vals)=> { let gratuity = vals.basic * vals.years * 15/26; return `Gratuity: ₹${gratuity.toFixed(2)}`; } },
        { id: "ppf", name: "PPF Calculator", desc: "Public Provident Fund", fields:[{n:"annual",l:"Annual Deposit (₹)",def:150000},{n:"rate",l:"Rate (%)",def:7.1},{n:"years",l:"Years",def:15}], compute:(vals)=> { let maturity = vals.annual * ((Math.pow(1+vals.rate/100,vals.years)-1)/(vals.rate/100)); return `Maturity: ₹${maturity.toFixed(2)}`; } },
        { id: "nps", name: "NPS Calculator", desc: "Pension + lump sum", fields:[{n:"monthly",l:"Monthly (₹)",def:5000},{n:"return",l:"Return (%)",def:10},{n:"years",l:"Years",def:30}], compute:(vals)=> { let r=vals.return/12/100; let n=vals.years*12; let corpus = vals.monthly * ((Math.pow(1+r,n)-1)/r)*(1+r); let annuity = corpus*0.4; let lump = corpus*0.6; return `Lumpsum: ₹${lump.toFixed(0)} | Pension 40% annuity`; } },
        { id: "inflation", name: "Inflation Calculator", desc: "Future value erosion", fields:[{n:"amount",l:"Today's Value (₹)",def:100000},{n:"rate",l:"Inflation (%)",def:6},{n:"years",l:"Years",def:10}], compute:(vals)=> { let future = vals.amount / Math.pow(1+vals.rate/100, vals.years); return `Future worth: ₹${future.toFixed(2)}`; } },
        { id: "annuity", name: "Annuity Calculator", desc: "Periodic payments", fields:[{n:"present",l:"Present Value (₹)",def:10e5},{n:"rate",l:"Rate (%)",def:8},{n:"years",l:"Years",def:20}], compute:(vals)=> { let r=vals.rate/100; let pmt = vals.present * r / (1 - Math.pow(1+r, -vals.years)); return `Annual Payout: ₹${pmt.toFixed(2)}`; } },
        { id: "roi", name: "ROI Calculator", desc: "Return on investment", fields:[{n:"gain",l:"Net Gain (₹)",def:50000},{n:"cost",l:"Investment Cost (₹)",def:200000}], compute:(vals)=> { let roi = (vals.gain/vals.cost)*100; return `ROI: ${roi.toFixed(2)}%`; } },
        { id: "breakEven", name: "Break-even Point", desc: "Units to break-even", fields:[{n:"fixed",l:"Fixed Cost (₹)",def:50000},{n:"price",l:"Price/Unit (₹)",def:500},{n:"vc",l:"Variable Cost/Unit",def:300}], compute:(vals)=> { let bep = vals.fixed / (vals.price - vals.vc); return `Break-even: ${Math.ceil(bep)} units`; } },
        { id: "incomeTax", name: "Income Tax (Simple)", desc: "New regime approximation", fields:[{n:"income",l:"Annual Income (₹)",def:1200000}], compute:(vals)=> { let inc=vals.income; let tax=0; if(inc>1500000) tax=(inc-1500000)*0.3+150000; else if(inc>1200000) tax=(inc-1200000)*0.2+75000; else if(inc>900000) tax=(inc-900000)*0.15+45000; else if(inc>600000) tax=(inc-600000)*0.1+15000; else if(inc>300000) tax=(inc-300000)*0.05; return `Estimated Tax: ₹${tax.toFixed(0)} + cess`; } },
        { id: "capitalGains", name: "Capital Gains Tax", desc: "Long term (over 1y)", fields:[{n:"buy",l:"Buy Price (₹)",def:100000},{n:"sell",l:"Sell Price (₹)",def:180000},{n:"years",l:"Holding Years",def:3}], compute:(vals)=> { let gain=vals.sell-vals.buy; let tax=(vals.years>1)? gain*0.1 : gain*0.15; return `Gain: ₹${gain} | Tax: ₹${tax.toFixed(2)}`; } },
        { id: "profitMargin", name: "Profit Margin", desc: "Net margin %", fields:[{n:"revenue",l:"Revenue (₹)",def:500000},{n:"cost",l:"Total Cost (₹)",def:350000}], compute:(vals)=> { let margin = (vals.revenue-vals.cost)/vals.revenue*100; return `Margin: ${margin.toFixed(2)}%`; } },
        { id: "discount", name: "Discount Calculator", desc: "Sale price after % off", fields:[{n:"price",l:"Original Price",def:2500},{n:"disc",l:"Discount (%)",def:20}], compute:(vals)=> { let final = vals.price * (1 - vals.disc/100); return `Final Price: ₹${final.toFixed(2)}`; } },
        { id: "currency", name: "Currency Converter", desc: "USD/INR/EUR demo", fields:[{n:"amount",l:"Amount",def:100},{n:"fromCurr",l:"From",def:"USD",type:"select",options:["USD","EUR","GBP"]},{n:"toCurr",l:"To",def:"INR",type:"select",options:["INR","USD","EUR"]}], compute:(vals)=> { let rates={USD:1, EUR:0.92, GBP:0.78, INR:83.5}; let fromRate = rates[vals.fromCurr]||1; let toRate = rates[vals.toCurr]||1; let converted = vals.amount * (toRate/fromRate); return `${vals.amount} ${vals.fromCurr} = ${converted.toFixed(2)} ${vals.toCurr}`; } },
        { id: "educationLoan", name: "Education Loan EMI", desc: "Moratorium option", fields:[{n:"principal",l:"Loan Amount (₹)",def:800000},{n:"rate",l:"Rate (%)",def:9},{n:"months",l:"Repayment months",def:84}], compute:(vals)=> { let r=vals.rate/12/100; let emi = vals.principal * r * Math.pow(1+r,vals.months) / (Math.pow(1+r,vals.months)-1); return `EMI: ₹${emi.toFixed(2)}`; } },
        { id: "lateFeeEmi", name: "EMI with Late Fee", desc: "Late payment penalty", fields:[{n:"emi",l:"Original EMI (₹)",def:15000},{n:"lateDays",l:"Days late",def:15},{n:"penaltyPct",l:"Daily penal %",def:0.05}], compute:(vals)=> { let penalty = vals.emi * (vals.penaltyPct/100) * vals.lateDays; return `Total due: ₹${(vals.emi+penalty).toFixed(2)} (Penalty ₹${penalty.toFixed(2)})`; } }
    ];

    // History Management (localStorage)
    let history = JSON.parse(localStorage.getItem("fin_history")) || [];
    function saveHistory() { localStorage.setItem("fin_history", JSON.stringify(history)); }
    function addHistory(calcName, inputsObj, resultStr) {
        history.unshift({ id: Date.now(), name: calcName, inputs: JSON.stringify(inputsObj), result: resultStr, timestamp: new Date().toLocaleString() });
        if(history.length > 80) history = history.slice(0,80);
        saveHistory();
        renderDashboardAndHistory();
    }

    function renderDashboardAndHistory() {
        const dashboardDiv = document.getElementById("dashboardStats");
        const recentPreview = document.getElementById("recentHistoryPreview");
        const fullHistoryDiv = document.getElementById("fullHistoryList");
        if(dashboardDiv) {
            let total = history.length;
            let byType = {};
            history.forEach(h=> { byType[h.name] = (byType[h.name]||0)+1; });
            let topType = Object.entries(byType).sort((a,b)=>b[1]-a[1])[0]?.[0] || "—";
            dashboardDiv.innerHTML = `<div class="stat-card"><i class="fas fa-calculator"></i><h3>${total}</h3><p>Total calcs</p></div>
            <div class="stat-card"><i class="fas fa-chart-simple"></i><h3>${topType}</h3><p>Most used</p></div>
            <div class="stat-card"><i class="fas fa-layer-group"></i><h3>${calculators.length}</h3><p>Tools ready</p></div>`;
        }
        let recentHtml = history.slice(0,5).map(h=> `<div><strong>${h.name}</strong><br><small>${h.result.substring(0,70)}</small><div style="font-size:11px;">${h.timestamp}</div></div><hr>`).join('');
        if(recentPreview) recentPreview.innerHTML = recentHtml || "<div class='empty-msg'>No history yet</div>";
        if(fullHistoryDiv) fullHistoryDiv.innerHTML = history.map(h=> `<div class="history-item"><div><b>${h.name}</b><div style="font-size:13px;">${h.result}</div><small>${h.timestamp}</small><div style="font-size:11px;">${h.inputs}</div></div><button class="delete-history" data-id="${h.id}">🗑️</button></div>`).join('') || "<div class='empty-msg'>No records</div>";
        document.querySelectorAll(".delete-history").forEach(btn=> btn.addEventListener("click",(e)=>{
            let id = parseInt(btn.dataset.id);
            history = history.filter(item=> item.id !== id);
            saveHistory(); renderDashboardAndHistory();
        }));
    }

    function renderCards() {
        const grid = document.getElementById("calculatorsGrid");
        grid.innerHTML = calculators.map(calc => `
            <div class="calc-card" data-id="${calc.id}">
                <div class="card-icon"><i class="fas fa-chart-line"></i></div>
                <h3>${calc.name}</h3>
                <p>${calc.desc}</p>
            </div>
        `).join('');
        document.querySelectorAll('.calc-card').forEach(card=> card.addEventListener('click',()=> openModal(card.dataset.id)));
    }

    let currentCalcObj = null;
    function openModal(calcId) {
        currentCalcObj = calculators.find(c=>c.id === calcId);
        if(!currentCalcObj) return;
        document.getElementById("modalTitle").innerText = currentCalcObj.name;
        const fieldsDiv = document.getElementById("modalDynamicFields");
        fieldsDiv.innerHTML = currentCalcObj.fields.map(f=> {
            let inputHtml = `<div class="input-group"><label>${f.l}</label>`;
            if(f.type === 'select') {
                let opts = f.options.map(opt=> `<option value="${opt}" ${opt==f.def?'selected':''}>${opt}</option>`).join('');
                inputHtml += `<select id="field_${f.n}">${opts}</select>`;
            } else {
                inputHtml += `<input type="number" step="any" id="field_${f.n}" value="${f.def}" />`;
            }
            inputHtml += `</div>`;
            return inputHtml;
        }).join('');
        document.getElementById("modalResult").innerHTML = "—";
        document.getElementById("calcModal").classList.add("active");
    }

    document.getElementById("modalCalculateBtn").onclick = () => {
        if(!currentCalcObj) return;
        let values = {};
        for(let f of currentCalcObj.fields) {
            let el = document.getElementById(`field_${f.n}`);
            if(el) values[f.n] = f.type === 'select' ? el.value : parseFloat(el.value);
        }
        try {
            let resultText = currentCalcObj.compute(values);
            document.getElementById("modalResult").innerHTML = `<i class="fas fa-rupee-sign"></i> ${resultText}`;
            addHistory(currentCalcObj.name, values, resultText);
        } catch(e) { document.getElementById("modalResult").innerHTML = "Error in calculation"; }
    };
    function closeModal() { document.getElementById("calcModal").classList.remove("active"); }
    document.getElementById("closeModalBtn").onclick = closeModal;
    document.getElementById("calcModal").addEventListener("click",(e)=> { if(e.target === document.getElementById("calcModal")) closeModal(); });

    // Tab Switching
    function switchTab(tabId) {
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.getElementById(`${tabId}Tab`).style.display = "block";
        document.querySelectorAll(".tab-btn").forEach(btn=> btn.classList.remove("active"));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add("active");
        if(tabId === "dashboard" || tabId === "history") renderDashboardAndHistory();
    }
    document.querySelectorAll(".tab-btn").forEach(btn=> btn.addEventListener("click",()=> switchTab(btn.dataset.tab)));
    document.getElementById("clearAllHistoryBtn")?.addEventListener("click",()=> { history = []; saveHistory(); renderDashboardAndHistory(); switchTab("history"); });
    document.getElementById("settingsClearHistoryBtn")?.addEventListener("click",()=> { history = []; saveHistory(); renderDashboardAndHistory(); alert("History cleared"); });
    
    // Theme handling
    function initTheme() { let dark = localStorage.getItem("fin_theme") === "dark"; if(dark) document.body.classList.add("dark"); else document.body.classList.remove("dark"); }
    function toggleTheme() { document.body.classList.toggle("dark"); localStorage.setItem("fin_theme", document.body.classList.contains("dark") ? "dark" : "light"); }
    document.getElementById("themeToggleBtn").addEventListener("click",toggleTheme);
    document.getElementById("settingsThemeBtn")?.addEventListener("click",toggleTheme);
    
    initTheme();
    renderCards();
    renderDashboardAndHistory();
</script>
</body>
</html>
